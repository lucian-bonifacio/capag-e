name: capag

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: capag
      POSTGRES_USER: capag
      POSTGRES_PASSWORD: capag_local_password
    ports:
      - "5432:5432"
    volumes:
      - capag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capag -d capag"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.12-slim
    working_dir: /workspace/backend
    environment:
      CAPAG_DATABASE_URL: postgresql+psycopg://capag:capag_local_password@postgres:5432/capag
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "rm -rf /tmp/capag-backend
      && cp -R /workspace/backend /tmp/capag-backend
      && cd /tmp/capag-backend
      && python -m pip install --disable-pip-version-check --root-user-action=ignore -e .
      && alembic -c alembic.ini upgrade head
      && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  backend-tests:
    image: python:3.12-slim
    profiles:
      - test
    working_dir: /workspace/backend
    volumes:
      - .:/workspace
    command: >
      sh -c "rm -rf /tmp/capag-backend
      && cp -R /workspace/backend /tmp/capag-backend
      && cd /tmp/capag-backend
      && python -m pip install --disable-pip-version-check --root-user-action=ignore -e '.[test]'
      && python -m pytest"

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    command: >
      sh -c "rm -rf /tmp/capag-frontend
      && cp -R /workspace/frontend /tmp/capag-frontend
      && cd /tmp/capag-frontend
      && npm install --no-package-lock --audit=false --fund=false
      && npm run dev"

  frontend-tests:
    image: node:20-alpine
    profiles:
      - test
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    command: >
      sh -c "rm -rf /tmp/capag-frontend
      && cp -R /workspace/frontend /tmp/capag-frontend
      && cd /tmp/capag-frontend
      && npm install --no-package-lock --audit=false --fund=false
      && npm run test
      && npm run build"

volumes:
  capag_postgres_data:
