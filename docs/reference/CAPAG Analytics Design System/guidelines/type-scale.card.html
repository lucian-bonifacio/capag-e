<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="From KPI value down to micro labels" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-card); font-family:var(--font-sans); color:var(--text-primary); }
  .line { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--border); }
  .line:last-child { border-bottom:none; }
  .tok { width:120px; flex:none; font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .ex { color:var(--text-primary); }
</style></head>
<body>
  <div class="line"><div class="tok">2xl · 28 / 600</div><div class="ex" style="font-size:var(--text-2xl); font-weight:600; letter-spacing:-.01em;">R$ 48,2 mi</div></div>
  <div class="line"><div class="tok">xl · 22 / 600</div><div class="ex" style="font-size:var(--text-xl); font-weight:600;">Indicadores CAPAG</div></div>
  <div class="line"><div class="tok">lg · 18 / 600</div><div class="ex" style="font-size:var(--text-lg); font-weight:600;">Ativo Circulante</div></div>
  <div class="line"><div class="tok">base · 14 / 400</div><div class="ex" style="font-size:var(--text-base);">Caixa e equivalentes de caixa</div></div>
  <div class="line"><div class="tok">sm · 13 / 400</div><div class="ex" style="font-size:var(--text-sm); color:var(--text-secondary);">Texto secundário e metadados</div></div>
  <div class="line"><div class="tok">xs · 12 / 600</div><div class="ex eyebrow">Eyebrow / rótulo</div></div>
</body></html>
