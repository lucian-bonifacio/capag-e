<!-- @dsCard group="Type" viewport="700x180" name="Inter — Family & Weights" subtitle="The single UI typeface" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-card); font-family:var(--font-sans); color:var(--text-primary); }
  .big { font-size:44px; font-weight:600; letter-spacing:-0.01em; line-height:1; }
  .sub { font-size:13px; color:var(--text-secondary); margin-top:6px; }
  .weights { display:flex; gap:24px; margin-top:18px; }
  .w span { display:block; font-size:24px; }
  .w small { font-size:11px; color:var(--text-secondary); }
</style></head>
<body>
  <div class="big">Balanço Patrimonial</div>
  <div class="sub">Inter · ui-sans-serif fallback</div>
  <div class="weights">
    <div class="w"><span style="font-weight:400">Aa</span><small>Regular 400</small></div>
    <div class="w"><span style="font-weight:500">Aa</span><small>Medium 500</small></div>
    <div class="w"><span style="font-weight:600">Aa</span><small>Semibold 600</small></div>
    <div class="w"><span style="font-weight:700">Aa</span><small>Bold 700</small></div>
  </div>
</body></html>
