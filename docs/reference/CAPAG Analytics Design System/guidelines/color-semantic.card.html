<!-- @dsCard group="Colors" viewport="700x170" name="Semantic — Success / Warning / Danger" subtitle="Status only — soft fill + solid accent" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; }
  .col { flex:1; display:flex; flex-direction:column; gap:6px; }
  .pair { display:flex; gap:6px; }
  .chip { height:48px; flex:1; border-radius:var(--radius-md); border:1px solid rgba(15,23,42,.06); }
  .name { font-size:12px; font-weight:600; color:var(--text-primary); }
  .hex { font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="col">
      <div class="pair"><div class="chip" style="background:var(--success-soft)"></div><div class="chip" style="background:var(--success)"></div></div>
      <div class="name">Sucesso</div><div class="hex">#F0FDF4 · #16A34A</div>
    </div>
    <div class="col">
      <div class="pair"><div class="chip" style="background:var(--warning-soft)"></div><div class="chip" style="background:var(--warning)"></div></div>
      <div class="name">Alerta</div><div class="hex">#FFFBEB · #F59E0B</div>
    </div>
    <div class="col">
      <div class="pair"><div class="chip" style="background:var(--danger-soft)"></div><div class="chip" style="background:var(--danger)"></div></div>
      <div class="name">Erro</div><div class="hex">#FEF2F2 · #DC2626</div>
    </div>
  </div>
</body></html>
