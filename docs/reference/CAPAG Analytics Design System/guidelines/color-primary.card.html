<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Blue" subtitle="Actions, links, active nav, focus" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:var(--radius-md); border:1px solid rgba(15,23,42,.06); }
  .name { font-size:12px; font-weight:600; color:var(--text-primary); margin-top:8px; }
  .hex { font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="name">Soft</div><div class="hex">#EFF6FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="name">Tint</div><div class="hex">#DBEAFE</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">Primary 600</div><div class="hex">#2563EB</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-hover)"></div><div class="name">Hover 700</div><div class="hex">#1D4ED8</div></div>
  </div>
</body></html>
