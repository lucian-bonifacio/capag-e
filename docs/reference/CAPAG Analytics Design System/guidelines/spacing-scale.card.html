<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base grid — generous by default" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-card); font-family:var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { text-align:center; }
  .bar { background:var(--primary-soft); border:1px solid var(--blue-100); border-radius:var(--radius-sm); }
  .lbl { font-size:11px; color:var(--text-secondary); margin-top:8px; font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">1·4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">2·8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">3·12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">4·16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">6·24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">8·32</div></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="lbl">12·48</div></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="lbl">16·64</div></div>
  </div>
</body></html>
