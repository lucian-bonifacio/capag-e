<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Slate" subtitle="Text, surfaces, borders, backgrounds" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-card); font-family:var(--font-sans); }
  .row { display:flex; gap:8px; }
  .sw { flex:1; }
  .chip { height:56px; border-radius:var(--radius-sm); border:1px solid rgba(15,23,42,.06); }
  .name { font-size:10px; font-weight:600; color:var(--text-primary); margin-top:6px; }
  .hex { font-size:10px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="name">50</div><div class="hex">F8FAFC</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="name">100</div><div class="hex">F1F5F9</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="name">200</div><div class="hex">E2E8F0</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="name">300</div><div class="hex">CBD5E1</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="name">400</div><div class="hex">94A3B8</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="name">500</div><div class="hex">64748B</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="name">700</div><div class="hex">334155</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="name">900</div><div class="hex">0F172A</div></div>
  </div>
</body></html>
