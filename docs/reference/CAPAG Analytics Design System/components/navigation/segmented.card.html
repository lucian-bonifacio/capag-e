<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 24px; background: var(--bg-app); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SegmentedControl } = window.CAPAGAnalyticsDesignSystem_0c00db;
  const Ico = (p) => (props) => (<svg width={(props&&props.size)||15} height={(props&&props.size)||15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p}</svg>);
  const IconColumns = Ico(<><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></>);
  const IconRows = Ico(<><path d="M3 6h18M3 12h18M3 18h18"/></>);
  function Demo() {
    const [v, setV] = React.useState("columns");
    return (
      <div style={{display:'flex', alignItems:'center', gap:24}}>
        <SegmentedControl value={v} onChange={setV} options={[
          { id:"columns", label:"Duas colunas", icon:<IconColumns/> },
          { id:"ledger", label:"Livro-razão", icon:<IconRows/> },
        ]} />
        <SegmentedControl size="md" value={v} onChange={setV} options={[
          { id:"columns", label:"Duas colunas" },
          { id:"ledger", label:"Livro-razão" },
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
