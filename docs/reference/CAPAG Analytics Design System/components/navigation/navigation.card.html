<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-app); }
  .shell { display: flex; height: 420px; }
  .ico { width: 18px; height: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Sidebar, Topbar, Button, Input } = window.CAPAGAnalyticsDesignSystem_0c00db;
  const I = (d) => <svg className="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
  const icons = {
    dash: I(<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>),
    sheet: I(<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 3v18M3 9h18"/></>),
    gauge: I(<><path d="M12 14 16 9"/><path d="M3.5 18a9 9 0 1 1 17 0"/></>),
    audit: I(<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>),
    upload: I(<><path d="M12 15V3M7 8l5-5 5 5"/><path d="M5 21h14"/></>),
    search: I(<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>),
  };

  function Demo() {
    const [active, setActive] = React.useState("balanco");
    return (
      <div className="shell">
        <Sidebar
          activeId={active}
          onSelect={setActive}
          items={[
            { id: "dashboard", label: "Dashboard", icon: icons.dash },
            { id: "balanco", label: "Balanço Patrimonial", icon: icons.sheet },
            { id: "indicadores", label: "Indicadores CAPAG", icon: icons.gauge },
            { id: "auditoria", label: "Auditoria", icon: icons.audit, badge: 3 },
            { id: "importar", label: "Importar ECD", icon: icons.upload },
          ]}
        />
        <div style={{flex:1, display:'flex', flexDirection:'column', minWidth:0}}>
          <Topbar
            title="Balanço Patrimonial"
            subtitle="Exercício 2024"
            actions={<>
              <Input iconLeft={icons.search} placeholder="Buscar conta…" size="sm" wrapperStyle={{width:200}} />
              <Button size="sm">Importar ECD</Button>
            </>}
          />
          <div style={{flex:1, padding:24, color:'var(--text-secondary)', fontSize:14}}>
            Área principal de conteúdo…
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
