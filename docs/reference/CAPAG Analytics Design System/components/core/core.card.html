<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .group { margin-bottom: 22px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Switch, Input } = window.CAPAGAnalyticsDesignSystem_0c00db;
  const Search = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
  );

  function Demo() {
    const [on1, setOn1] = React.useState(true);
    const [on2, setOn2] = React.useState(false);
    return (
      <div>
        <div className="group">
          <div className="lbl">Buttons</div>
          <div className="row">
            <Button variant="primary">Salvar análise</Button>
            <Button variant="secondary">Cancelar</Button>
            <Button variant="ghost" iconLeft={<Search/>}>Buscar</Button>
            <Button variant="danger">Excluir</Button>
            <Button variant="primary" disabled>Desabilitado</Button>
          </div>
          <div className="row" style={{marginTop: 12}}>
            <Button size="sm" variant="primary">Pequeno</Button>
            <Button size="sm" variant="secondary">Pequeno</Button>
          </div>
        </div>

        <div className="group">
          <div className="lbl">Badges</div>
          <div className="row">
            <Badge variant="success">Incluída</Badge>
            <Badge variant="neutral">Excluída</Badge>
            <Badge variant="primary">CAPAG B</Badge>
            <Badge variant="warning">Revisar</Badge>
            <Badge variant="danger">Inconsistência</Badge>
            <Badge variant="neutral">18 contas</Badge>
          </div>
        </div>

        <div className="group" style={{display:'flex', gap: 48}}>
          <div>
            <div className="lbl">Switch</div>
            <div className="row">
              <Switch checked={on1} onChange={setOn1} aria-label="Conta 1" />
              <Switch checked={on2} onChange={setOn2} aria-label="Conta 2" />
              <Switch checked={true} disabled aria-label="Bloqueada" />
            </div>
          </div>
          <div style={{flex:1, maxWidth: 320}}>
            <div className="lbl">Input de busca</div>
            <Input iconLeft={<Search/>} placeholder="Buscar conta ou grupo…" wrapperStyle={{display:'flex', width:'100%'}} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
