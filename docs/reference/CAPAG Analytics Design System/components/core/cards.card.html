<!-- @dsCard group="Components" viewport="700x300" name="Cards & Stat tiles" subtitle="White surfaces + calculated KPI tiles" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, CardHeader, StatCard, Button, Switch } = window.CAPAGAnalyticsDesignSystem_0c00db;

  function Demo() {
    return (
      <div>
        <div className="stats">
          <StatCard label="Indicador CAPAG" value="B" tone="success" hint="Capacidade boa" />
          <StatCard label="Liquidez Corrente" value="1,84" tone="neutral" hint="Acima de 1,0" />
          <StatCard label="Endividamento" value="42,6%" tone="warning" hint="Atenção" />
          <StatCard label="Poupança Corrente" value="11,2%" tone="primary" hint="Resultado positivo" />
        </div>
        <Card>
          <CardHeader title="Ativos" subtitle="3 grupos · R$ 48,2 mi" action={<Button size="sm" variant="secondary">Exportar</Button>} />
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 0', borderTop:'1px solid var(--border)'}}>
            <span style={{fontSize:14, color:'var(--text-primary)'}}>Ativo Circulante</span>
            <span style={{display:'flex', alignItems:'center', gap:14}}>
              <span className="tnum" style={{fontSize:14, color:'var(--text-primary)', fontWeight:600}}>R$ 21,4 mi</span>
              <Switch checked={true} aria-label="Incluir" />
            </span>
          </div>
        </Card>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
