<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 24px; background: var(--bg-app); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Dialog, DataTable, Accordion, Badge, Button } = window.CAPAGAnalyticsDesignSystem_0c00db;
  function Demo() {
    const [open, setOpen] = React.useState(false);
    const cols = [
      { key: "data", header: "Data" },
      { key: "hist", header: "Histórico", wrap: true },
      { key: "doc", header: "Documento" },
      { key: "deb", header: "Débito", align: "right", numeric: true },
      { key: "cred", header: "Crédito", align: "right", numeric: true },
    ];
    const rows = [
      { data: "12/03/2024", hist: "Recebimento cliente NF 1042", doc: "REC-1042", deb: "—", cred: "120.400,00" },
      { data: "18/03/2024", hist: "Pagamento fornecedor", doc: "PG-3391", deb: "84.200,00", cred: "—" },
      { data: "29/03/2024", hist: "Aplicação resgate automático", doc: "APL-0098", deb: "—", cred: "9.800,00" },
    ];
    return (
      <div>
        <Accordion title="Ativo Circulante" defaultOpen meta={<Badge variant="neutral">12 contas</Badge>}>
          <div style={{padding:'14px 20px', fontSize:14, color:'var(--text-secondary)'}}>
            Conteúdo do grupo colapsável. <Button size="sm" variant="ghost" onClick={()=>setOpen(true)}>Ver auditoria</Button>
          </div>
        </Accordion>
        <div style={{marginTop:14}}>
          <Button onClick={()=>setOpen(true)}>Abrir auditoria (Dialog)</Button>
        </div>
        <Dialog open={open} onClose={()=>setOpen(false)} title="Auditoria — Caixa e Equivalentes" subtitle="1.1.1.01 · 3 lançamentos"
          footer={<><Button variant="secondary" onClick={()=>setOpen(false)}>Fechar</Button><Button>Exportar</Button></>}>
          <DataTable columns={cols} rows={rows} />
        </Dialog>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
