name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  validation:
    name: Validacoes minimas
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_DISABLE_ENV_FILE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar Docker Compose
        run: docker compose --profile test config

      - name: Testes backend
        run: docker compose --profile test run --rm backend-tests

      - name: Testes frontend
        run: docker compose --profile test run --rm frontend-tests
